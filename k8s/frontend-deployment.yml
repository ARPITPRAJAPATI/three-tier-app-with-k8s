apiVersion: apps/v1
kind: Deployment 
metadata:
  name: frontend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend-pod
      namespace: chat-app
      labels:
        app: frontend
    spec: 
      containers:
      - name: chatapp-frontend
        image: aruhehe/3-tier-app-frt:latest
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: production